<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" role="img" aria-label="localpages pipeline diagram">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #d0d7de; stroke-width: 1.5; }
      .arrow { fill: none; stroke: #656d76; stroke-width: 1.5; }
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 14px; fill: #1f2328; }
      .accent { fill: #0969da; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#656d76"/>
    </marker>
  </defs>
  <rect width="600" height="220" fill="#f6f8fa"/>
  <rect class="box" x="20"  y="80" width="120" height="60" rx="6"/>
  <text class="label" x="80"  y="115" text-anchor="middle">Markdown</text>
  <rect class="box" x="180" y="80" width="120" height="60" rx="6"/>
  <text class="label accent" x="240" y="115" text-anchor="middle">localpages</text>
  <rect class="box" x="340" y="20" width="120" height="60" rx="6"/>
  <text class="label" x="400" y="55" text-anchor="middle">Live preview</text>
  <rect class="box" x="340" y="140" width="120" height="60" rx="6"/>
  <text class="label" x="400" y="175" text-anchor="middle">Static ZIP</text>
  <line class="arrow" x1="140" y1="110" x2="180" y2="110" marker-end="url(#arrow)"/>
  <line class="arrow" x1="300" y1="100" x2="340" y2="60" marker-end="url(#arrow)"/>
  <line class="arrow" x1="300" y1="120" x2="340" y2="170" marker-end="url(#arrow)"/>
</svg>
